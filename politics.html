<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #0f1a16;
    --surface: #162019;
    --surface2: #1c2920;
    --border: rgba(255,255,255,0.09);
    --text: #edf8f4;
    --muted: #9ab8af;
    --accent: #4bdc96;
    --d-color: #4b8cff;
    --r-color: #f16565;
    --other-color: #a6b8af;
    --t-color: #9d5dff;
    --row-h: 52px;
    --axis-h: 32px;
    --label-w: 80px;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
}

header {
    padding: 24px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 20px;
    flex-wrap: wrap;
}

header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
}

header .back-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    font-family: 'IBM Plex Mono', monospace;
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    transition: color 0.15s, border-color 0.15s;
}

header .back-link:hover {
    color: var(--accent);
    border-color: var(--accent);
}

.controls {
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
}

.preset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
}

.preset-btn:hover, .preset-btn.active {
    background: rgba(75, 220, 150, 0.12);
    border-color: var(--accent);
    color: var(--accent);
}

.year-inputs {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
}

.year-inputs label {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
}

.year-inputs input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    padding: 4px 8px;
    border-radius: 6px;
    width: 70px;
    text-align: center;
}

.year-inputs input:focus {
    outline: none;
    border-color: var(--accent);
}

.legend {
    padding: 10px 32px 10px calc(var(--label-w) + 32px);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
}

.legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
}

.timeline-outer {
    padding: 20px 32px 32px;
    overflow-x: auto;
    overflow-y: hidden;
}

.timeline-wrap {
    display: flex;
    align-items: stretch;
    min-width: 900px;
}

.track-labels {
    width: var(--label-w);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding-top: 0;
}

.track-label {
    height: var(--row-h);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 12px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(154, 184, 175, 0.55);
    font-family: 'IBM Plex Mono', monospace;
    border-bottom: 1px solid var(--border);
}

.track-label:last-child {
    border-bottom: none;
}

.canvas-wrap {
    flex: 1;
    min-width: 0;
    position: relative;
}

canvas#timeline {
    display: block;
    width: 100%;
    cursor: crosshair;
}

.tooltip-box {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 100;
    max-width: 260px;
    line-height: 1.5;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.tooltip-box.visible {
    opacity: 1;
}

.tooltip-party {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: middle;
}

.tooltip-title {
    font-weight: 700;
    margin-bottom: 3px;
}

.tooltip-sub {
    color: var(--muted);
    font-size: 0.72rem;
}

.era-note {
    padding: 10px 32px 4px calc(var(--label-w) + 32px);
    font-size: 0.72rem;
    color: rgba(154, 184, 175, 0.4);
    font-family: 'IBM Plex Mono', monospace;
    font-style: italic;
}
</style>

    { start: "2023-01-03", end: "2025-01-03", house: "R", senate: "D", houseSeats: "222-213", senateSeats: "51-49" },
    { start: "2025-01-03", end: "2027-01-03", house: "R", senate: "R", houseSeats: "220-215", senateSeats: "53-47" }
].map((p) => ({ ...p, startMs: new Date(p.start).getTime(), endMs: new Date(p.end).getTime() }));

// Merge consecutive same-senate-party runs
const SENATE_PERIODS = (() => {
    const merged = [];
    for (const p of CONGRESSIONAL_CONTROL) {
        const last = merged[merged.length - 1];
        if (last && last.senate === p.senate) { last.endMs = p.endMs; last.end = p.end; last.senateSeats = p.senateSeats; }
        else merged.push({ ...p });
    }
    return merged;
})();

// Merge consecutive same-house-party runs
const HOUSE_PERIODS = (() => {
    const merged = [];
    for (const p of CONGRESSIONAL_CONTROL) {
        const last = merged[merged.length - 1];
        if (last && last.house === p.house) { last.endMs = p.endMs; last.end = p.end; last.houseSeats = p.houseSeats; }
        else merged.push({ ...p });
    }
    return merged;
})();

// ── Timeline State ───────────────────────────────────────────────────────────
const tl = {
    startYear: 1945,
    endYear: 2029,
    ROW_H: 52,
    AXIS_H: 32,
    PAD_TOP: 0,
    PAD_SIDES: 0,
    canvas: null,
    ctx: null,
    dpr: 1,
    width: 0,
    height: 0,
    hovered: null
};

function yearToMs(y) { return new Date(`${y}-01-01`).getTime(); }
function msToX(ms) {
    const startMs = yearToMs(tl.startYear);
    const endMs = yearToMs(tl.endYear);
    return tl.PAD_SIDES + ((ms - startMs) / (endMs - startMs)) * (tl.width - tl.PAD_SIDES * 2);
}
function xToMs(x) {
    const startMs = yearToMs(tl.startYear);
    const endMs = yearToMs(tl.endYear);
    return startMs + ((x - tl.PAD_SIDES) / (tl.width - tl.PAD_SIDES * 2)) * (endMs - startMs);
}
function msToYear(ms) { return new Date(ms).getFullYear(); }
function formatShortDate(isoStr) {
    const d = new Date(isoStr);
    return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

function resizeCanvas() {
    const wrap = tl.canvas.parentElement;
    tl.dpr = window.devicePixelRatio || 1;
    tl.width = wrap.clientWidth;
    const rows = 3;
    tl.height = rows * tl.ROW_H + tl.AXIS_H;
    tl.canvas.width = tl.width * tl.dpr;
    tl.canvas.height = tl.height * tl.dpr;
    tl.canvas.style.height = tl.height + "px";
    tl.ctx.setTransform(tl.dpr, 0, 0, tl.dpr, 0, 0);
}

function drawTimeline() {
    const { ctx, width, height, ROW_H, AXIS_H, PAD_SIDES } = tl;
    ctx.clearRect(0, 0, width, height);

    const startMs = yearToMs(tl.startYear);
    const endMs = yearToMs(tl.endYear);
    const spanYears = tl.endYear - tl.startYear;

    // Draw stripe rows
    const rows = [
        { data: PRESIDENTIAL_TERMS, partyKey: "party", nameKey: "name", y: 0 },
        { data: SENATE_PERIODS,     partyKey: "senate", nameKey: null,   y: ROW_H },
        { data: HOUSE_PERIODS,      partyKey: "house",  nameKey: null,   y: ROW_H * 2 }
    ];

    rows.forEach(({ data, partyKey, nameKey, y }) => {
        data.forEach((entry) => {
            const eStart = Math.max(entry.startMs, startMs);
            const eEnd = Math.min(entry.endMs, endMs);
            if (eEnd <= eStart) return;

            const x1 = msToX(eStart);
            const x2 = msToX(eEnd);
            const w = x2 - x1;
            if (w < 0.5) return;

            const party = entry[partyKey] || "OTHER";
            const isHovered = tl.hovered && tl.hovered.entry === entry && tl.hovered.row === y;

            ctx.fillStyle = isHovered
                ? (PARTY_COLORS_SOLID[party] || PARTY_COLORS_SOLID.OTHER).replace(/[\d.]+\)$/, "0.92)")
                : (PARTY_COLORS_SOLID[party] || PARTY_COLORS_SOLID.OTHER);
            ctx.fillRect(x1, y, w, ROW_H);

            // Border between segments
            ctx.strokeStyle = "rgba(10,22,16,0.6)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x1, y);
            ctx.lineTo(x1, y + ROW_H);
            ctx.stroke();

            // Label if wide enough
            if (w > 48 && nameKey && entry[nameKey]) {
                const name = entry[nameKey].split(" (")[0]; // strip parenthetical
                const lastName = name.split(" ").pop();
                ctx.save();
                ctx.fillStyle = "rgba(245,252,250,0.92)";
                ctx.font = `600 ${Math.min(11, Math.max(8, w / 8))}px 'IBM Plex Mono', monospace`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.beginPath();
                ctx.rect(x1, y, w, ROW_H);
                ctx.clip();
                ctx.fillText(w > 80 ? name : lastName, x1 + w / 2, y + ROW_H / 2);
                ctx.restore();
            } else if (w > 28 && !nameKey) {
                // For senate/house just show party initial if narrow
                const party = entry[partyKey] || "OTHER";
                if (party !== "OTHER") {
                    ctx.save();
                    ctx.fillStyle = "rgba(245,252,250,0.7)";
                    ctx.font = `700 ${Math.min(13, Math.max(9, w / 5))}px 'IBM Plex Mono', monospace`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.beginPath();
                    ctx.rect(x1, y, w, ROW_H);
                    ctx.clip();
                    ctx.fillText(party === "T" ? "TIE" : party, x1 + w / 2, y + ROW_H / 2);
                    ctx.restore();
                }
            }
        });

        // Row border
        ctx.strokeStyle = "rgba(10,22,16,0.8)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, y + ROW_H);
        ctx.lineTo(width, y + ROW_H);
        ctx.stroke();
    });

    // Year axis
    const axisY = ROW_H * 3;
    ctx.fillStyle = "rgba(154,184,175,0.06)";
    ctx.fillRect(0, axisY, width, AXIS_H);

    // Choose tick interval
    let step = 1;
    const pxPerYear = (width - PAD_SIDES * 2) / spanYears;
    if (pxPerYear < 4) step = 25;
    else if (pxPerYear < 8) step = 10;
    else if (pxPerYear < 18) step = 5;
    else if (pxPerYear < 36) step = 2;

    ctx.fillStyle = "rgba(154,184,175,0.65)";
    ctx.font = "500 10px 'IBM Plex Mono', monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for (let yr = Math.ceil(tl.startYear / step) * step; yr <= tl.endYear; yr += step) {
        const x = msToX(yearToMs(yr));
        if (x < 0 || x > width) continue;
        ctx.strokeStyle = "rgba(154,184,175,0.2)";
        ctx.lineWidth = 1;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(x, axisY);
        ctx.lineTo(x, axisY + 6);
        ctx.stroke();
        ctx.fillText(String(yr), x, axisY + 18);
    }

    // Gas data starts marker (1983)
    if (tl.startYear <= 1983 && tl.endYear >= 1983) {
        const gasX = msToX(yearToMs(1983));
        ctx.save();
        ctx.strokeStyle = "rgba(75,220,150,0.45)";
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(gasX, 0);
        ctx.lineTo(gasX, axisY);
        ctx.stroke();
        if (gasX + 80 < width) {
            ctx.fillStyle = "rgba(75,220,150,0.5)";
            ctx.font = "500 9px 'IBM Plex Mono', monospace";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            ctx.fillText("gas data starts", gasX + 4, 4);
        }
        ctx.restore();
    }
}

// ── Tooltip ──────────────────────────────────────────────────────────────────
function getHitAtPoint(canvasX, canvasY) {
    const { ROW_H } = tl;
    const startMs = yearToMs(tl.startYear);
    const endMs = yearToMs(tl.endYear);

    const rowDefs = [
        { data: PRESIDENTIAL_TERMS, partyKey: "party", nameKey: "name", label: "President", y: 0 },
        { data: SENATE_PERIODS, partyKey: "senate", nameKey: null, label: "Senate", y: ROW_H },
        { data: HOUSE_PERIODS, partyKey: "house", nameKey: null, label: "House", y: ROW_H * 2 }
    ];

    for (const row of rowDefs) {
        if (canvasY < row.y || canvasY >= row.y + ROW_H) continue;
        const ms = xToMs(canvasX);
        if (ms < startMs || ms > endMs) continue;

        for (const entry of row.data) {
            if (ms >= entry.startMs && ms < entry.endMs) {
                return { entry, row: row.y, rowLabel: row.label, partyKey: row.partyKey, nameKey: row.nameKey };
            }
        }
    }
    return null;
}

function showTooltip(hit, mouseX, mouseY) {
    const tooltip = document.getElementById("tooltip");
    if (!hit || !hit.entry) { tooltip.classList.remove("visible"); return; }

    const { entry, rowLabel, partyKey, nameKey } = hit;
    const party = entry[partyKey] || "OTHER";
    const partyLabel = PARTY_LABELS[party] || "Other";
    const color = PARTY_COLORS_SOLID[party] || PARTY_COLORS_SOLID.OTHER;
    const name = nameKey ? entry[nameKey] : null;

    let html = `<div class="tooltip-title"><span class="tooltip-party" style="background:${color}"></span>${rowLabel}</div>`;
    if (name) html += `<div>${name}</div>`;
    html += `<div class="tooltip-sub">${formatShortDate(entry.start)} – ${formatShortDate(entry.end)}</div>`;
    html += `<div class="tooltip-sub" style="margin-top:3px;">${partyLabel}</div>`;
    if (entry.senateSeats && entry.senateSeats !== "—" && rowLabel === "Senate") {
        html += `<div class="tooltip-sub">Seats: ${entry.senateSeats}</div>`;
    }
    if (entry.houseSeats && entry.houseSeats !== "—" && rowLabel === "House") {
        html += `<div class="tooltip-sub">Seats: ${entry.houseSeats}</div>`;
    }

    tooltip.innerHTML = html;
    tooltip.classList.add("visible");

    const vpW = window.innerWidth;
    const vpH = window.innerHeight;
    const tw = 270, th = 110;
    let tx = mouseX + 14;
    let ty = mouseY - 20;
    if (tx + tw > vpW) tx = mouseX - tw - 14;
    if (ty + th > vpH) ty = mouseY - th - 10;
    tooltip.style.left = tx + "px";
    tooltip.style.top = ty + "px";
}

// ── Init & Events ────────────────────────────────────────────────────────────
function setRange(startYear, endYear) {
    tl.startYear = startYear;
    tl.endYear = endYear;
    document.getElementById("startYearInput").value = startYear;
    document.getElementById("endYearInput").value = endYear;
    drawTimeline();
}

function init() {
    tl.canvas = document.getElementById("timeline");
    tl.ctx = tl.canvas.getContext("2d");
    resizeCanvas();
    drawTimeline();

    // Preset buttons
    document.querySelectorAll(".preset-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".preset-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            setRange(Number(btn.dataset.start), Number(btn.dataset.end));
        });
    });

    // Year inputs
    function applyYearInputs() {
        const s = parseInt(document.getElementById("startYearInput").value, 10);
        const e = parseInt(document.getElementById("endYearInput").value, 10);
        if (Number.isFinite(s) && Number.isFinite(e) && s < e) {
            document.querySelectorAll(".preset-btn").forEach((b) => b.classList.remove("active"));
            setRange(s, e);
        }
    }
    document.getElementById("startYearInput").addEventListener("change", applyYearInputs);
    document.getElementById("endYearInput").addEventListener("change", applyYearInputs);

    // Hover
    tl.canvas.addEventListener("mousemove", (e) => {
        const rect = tl.canvas.getBoundingClientRect();
        const cx = (e.clientX - rect.left) * (tl.canvas.width / tl.dpr / rect.width);
        const cy = (e.clientY - rect.top) * (tl.canvas.height / tl.dpr / rect.height);
        const hit = getHitAtPoint(cx, cy);

        const prevEntry = tl.hovered ? tl.hovered.entry : null;
        tl.hovered = hit;
        if (hit !== prevEntry) drawTimeline();

        showTooltip(hit, e.clientX, e.clientY);
    });

    tl.canvas.addEventListener("mouseleave", () => {
        tl.hovered = null;
        drawTimeline();
        document.getElementById("tooltip").classList.remove("visible");
    });

    // Resize
    let resizeTimer;
    window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => { resizeCanvas(); drawTimeline(); }, 80);
    });
}

document.addEventListener("DOMContentLoaded", init);
</script>
